<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>失控生日快乐</title>
  <meta name="description" content="一份送给失控的生日礼物。">
  <meta property="og:title" content="失控生日快乐">
  <meta property="og:description" content="一份送给失控的生日礼物。">
  <meta property="og:image" content="我做的卡通形象失控.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene-light scene-light-blue"></div>
  <div class="scene-light scene-light-gold"></div>
  <div class="transition-flash" aria-hidden="true"></div>
  <div class="particle-layer" aria-hidden="true"></div>

  <main class="story-app" aria-live="polite">
    <header class="story-topbar">
      <div class="profile-chip">
        <img src="失控头像.jpg" alt="失控的微信头像">
        <span>To 失控</span>
      </div>
      <div class="progress-dots" aria-label="场景进度">
        <span class="dot is-active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <button class="music-toggle" type="button" aria-label="开启背景音乐">♪</button>
    </header>

    <section class="scene scene-cover is-active" data-scene="0" aria-label="生日开场">
      <div class="phone-card cover-card">
        <p class="eyebrow">Happy Birthday</p>
        <h1><span>失控生日</span><span>快乐</span></h1>
        <p class="scene-copy">点一下，打开一份会唱歌、会翻页的生日礼物。</p>
        <button class="primary-action" type="button">开始生日礼物</button>
      </div>
      <div class="gift-orbit" aria-hidden="true">
        <span class="gift-box-shape">
          <span class="gift-lid"></span>
          <span class="gift-body"></span>
          <span class="gift-ribbon-v"></span>
          <span class="gift-ribbon-h"></span>
        </span>
      </div>
    </section>

    <section class="scene scene-avatar" data-scene="1" aria-label="头像祝福">
      <div class="phone-card split-card">
        <div>
          <span class="gift-label">Gift 01</span>
          <h2>第一道祝福光</h2>
          <p>愿你永远被真诚偏爱，也永远有向前走的底气。</p>
        </div>
        <img class="avatar-portrait" src="失控头像.jpg" alt="失控的微信头像">
      </div>
      <button class="primary-action" type="button">收下这份祝福</button>
    </section>

    <section class="scene scene-character" data-scene="2" aria-label="生日卡通形象">
      <div class="character-frame">
        <img src="我做的卡通形象失控.png" alt="失控生日卡通形象">
      </div>
      <div class="phone-card caption-card">
        <span class="gift-label">Gift 02</span>
        <h2>专属生日主角</h2>
        <p>蓝色缎带、金色星光和奶油味的愿望，都在今天为你亮起来。</p>
      </div>
      <button class="primary-action" type="button">继续翻页</button>
    </section>

    <section class="scene scene-photos" data-scene="3" aria-label="照片回忆">
      <div class="photo-stage">
        <figure class="memory-photo photo-one">
          <img src="失控照片1.jpg" alt="失控照片一">
          <figcaption>今天的光刚刚好</figcaption>
        </figure>
        <figure class="memory-photo photo-two">
          <img src="失控照片2.png" alt="失控照片二">
          <figcaption>温柔也很耀眼</figcaption>
        </figure>
        <figure class="memory-photo photo-three">
          <img src="失控照片3.jpg" alt="失控照片三">
          <figcaption>一路都要闪亮</figcaption>
        </figure>
        <figure class="memory-photo photo-four">
          <img src="失控照片4.jpg" alt="失控照片四">
          <figcaption>生日快乐呀</figcaption>
        </figure>
      </div>
      <div class="phone-card caption-card">
        <span class="gift-label">Gift 03</span>
        <h2>把喜欢的瞬间都收藏起来</h2>
      </div>
      <button class="primary-action" type="button">打开愿望卡</button>
    </section>

    <section class="scene scene-wish" data-scene="4" aria-label="生日愿望卡">
      <div class="wish-paper">
        <span class="gift-label">Gift 04</span>
        <h2>愿所有美好，都如约奔向你</h2>
        <p>
          愿你被爱包围，未来闪闪发光，平安喜乐，万事胜意。
          新的一岁，继续做自由、明亮、被珍惜的人。
        </p>
      </div>
      <button class="primary-action" type="button">看最终祝福</button>
    </section>

    <section class="scene scene-finale" data-scene="5" aria-label="最终生日祝福">
      <div class="finale-card">
        <p class="eyebrow">Always be with you</p>
        <h2>失控生日快乐</h2>
        <p>愿你往后的每一天，都有蓝天、金光、好消息和很多很多爱。</p>
        <button class="restart-action" type="button">重新播放</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
